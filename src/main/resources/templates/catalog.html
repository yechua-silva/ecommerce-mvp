<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Catálogo — E-Gym Fitness</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body class="bg-dark text-light">
<div class="container my-4">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary mb-4">
        <div class="container-fluid">
            <a class="navbar-brand text-success fw-bold" href="#">E-Gym Fitness</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link active" th:href="@{/catalog}">Catálogo</a></li>
                    
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link text-warning" th:href="@{/admin/products}">Admin Productos</a>
                    </li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/cart}">Carrito</a></li>
                </ul>
                <div class="d-flex align-items-center">
                    <span sec:authorize="isAuthenticated()" class="me-3">
                        Bienvenido, <span sec:authentication="name"></span>
                    </span>
                    <a sec:authorize="!isAuthenticated()" th:href="@{/login}" class="btn btn-outline-success btn-sm me-2">Login</a>
                    <a sec:authorize="!isAuthenticated()" th:href="@{/register}" class="btn btn-success btn-sm me-2">Registro</a>
                    <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-danger btn-sm">Salir</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <h1 class="text-success mb-4">Catálogo de Productos</h1>
    
    <form method="get" th:action="@{/catalog}" class="row g-2 mb-4">
        <div class="col-md-5">
            <input type="text" name="search" class="form-control bg-dark text-light border-secondary" 
                   placeholder="Buscar..." th:value="${search}">
        </div>
        <div class="col-md-4">
            <select name="category" class="form-select bg-dark text-light border-secondary">
                <option value="">Todas las categorías</option>
                <option th:each="cat : ${categories}" th:value="${cat.id}" 
                        th:text="${cat.name}" th:selected="${cat.id == selectedCategory}"></option>
            </select>
        </div>
        <div class="col-md-3">
            <button type="submit" class="btn btn-outline-success w-100">Filtrar</button>
        </div>
    </form>

    <div class="row">
        <div th:each="p : ${products}" class="col-md-4 mb-4">
            <div class="card bg-dark border-secondary h-100">
                <img th:src="${p.imageUrl}" class="card-img-top" alt="Producto" style="height:200px;object-fit:cover">
                <div class="card-body">
                    <h5 class="card-title text-success" th:text="${p.name}"></h5>
                    <p class="card-text text-muted" th:text="${p.description}"></p>
                    <p class="text-success fw-bold">$<span th:text="${p.price}"></span></p>
                	<form method="post" th:action="@{/cart/add}">
    					<input type="hidden" name="productId" th:value="${p.id}">
					    <input type="hidden" name="quantity" value="1">
					    <button type="submit" class="btn btn-outline-success btn-sm">Agregar al carrito</button>
					</form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
