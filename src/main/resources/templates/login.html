<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login — E-Gym Fitness</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light d-flex align-items-center" style="min-height:100vh">
<div class="container" style="max-width:400px">
    <h2 class="text-success mb-4 text-center">Iniciar Sesión</h2>
    
    <div th:if="${param.error}" class="alert alert-danger">Credenciales incorrectas</div>
    <div th:if="${param.logout}" class="alert alert-success">Sesión cerrada</div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    
    <form method="post" th:action="@{/login}">
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="username" class="form-control bg-dark text-light border-secondary" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input type="password" name="password" class="form-control bg-dark text-light border-secondary" required>
        </div>
        <button type="submit" class="btn btn-success w-100">Ingresar</button>
    </form>
    <p class="text-center mt-3">
        ¿No tienes cuenta? <a th:href="@{/register}" class="text-success">Regístrate</a>
    </p>
</div>
</body>
</html>
