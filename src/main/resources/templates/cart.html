<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Carrito — E-Gym Fitness</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-dark text-light">
<div class="container my-4">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary mb-4">
        <div class="container-fluid">
            <a class="navbar-brand text-success fw-bold" href="#">E-Gym Fitness</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/catalog}">Catálogo</a></li>
                    <li class="nav-item"><a class="nav-link active" th:href="@{/cart}">Carrito</a></li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link text-warning" th:href="@{/admin/products}">Admin</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center">
                    <span sec:authorize="isAuthenticated()" class="me-3">
                        Bienvenido, <span sec:authentication="name"></span>
                    </span>
                    <a sec:authorize="!isAuthenticated()" th:href="@{/login}" class="btn btn-outline-success btn-sm me-2">Login</a>
                    <a sec:authorize="!isAuthenticated()" th:href="@{/register}" class="btn btn-success btn-sm me-2">Registro</a>
                    <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-danger btn-sm">Salir</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <h1 class="text-success mb-4">Tu Carrito</h1>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div th:if="${cart.empty}">
        <p class="text-center">El carrito está vacío. <a th:href="@{/catalog}" class="text-success">Ir al catálogo</a></p>
    </div>

    <div th:unless="${cart.empty}">
        <div class="table-responsive">
            <table class="table table-dark table-striped">
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Precio unitario</th>
                        <th>Cantidad</th>
                        <th>Subtotal</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${cart}">
                        <td th:text="${item.name}"></td>
                        <td>$<span th:text="${item.price}"></span></td>
                        <td>
                            <form method="post" th:action="@{/cart/update}" class="d-inline">
                                <input type="hidden" name="productId" th:value="${item.productId}">
                                <input type="number" name="quantity" min="1" th:value="${item.quantity}" class="form-control form-control-sm d-inline" style="width:70px;">
                                <button type="submit" class="btn btn-sm btn-outline-success">Actualizar</button>
                            </form>
                        </td>
                        <td>$<span th:text="${item.subtotal}"></span></td>
                        <td>
                            <form method="post" th:action="@{/cart/remove}">
                                <input type="hidden" name="productId" th:value="${item.productId}">
                                <button type="submit" class="btn btn-sm btn-danger">Quitar</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
                <tfoot>
                    <tr>
                        <th colspan="3" class="text-end">Total</th>
                        <th>$<span th:text="${total}"></span></th>
                        <th></th>
                    </tr>
                </tfoot>
            </table>
        </div>
        <div class="d-flex justify-content-end">
            <form method="post" th:action="@{/cart/checkout}">
                <button type="submit" class="btn btn-success btn-lg">Finalizar Compra</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
