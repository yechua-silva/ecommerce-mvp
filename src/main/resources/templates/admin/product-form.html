<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${product.id} ? 'Editar Producto' : 'Nuevo Producto'">Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body class="bg-dark text-light">
<div class="container my-4" style="max-width:600px">
    <h2 class="text-success mb-4" th:text="${product.id} ? 'Editar Producto' : 'Nuevo Producto'"></h2>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form method="post" th:action="${product.id} ? @{/admin/products/update} : @{/admin/products}" th:object="${product}">
        <input type="hidden" name="id" th:if="${product.id}" th:value="${product.id}">

        <div class="mb-3">
            <label class="form-label">Nombre *</label>
            <input type="text" th:field="*{name}" class="form-control bg-dark text-light border-secondary" required>
            <div th:if="${#fields.hasErrors('name')}" class="text-danger" th:errors="*{name}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Descripción</label>
            <textarea th:field="*{description}" class="form-control bg-dark text-light border-secondary" rows="3"></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">Precio *</label>
            <input type="number" th:field="*{price}" step="0.01" min="0.01" class="form-control bg-dark text-light border-secondary" required>
            <div th:if="${#fields.hasErrors('price')}" class="text-danger" th:errors="*{price}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Categoría *</label>
            <select name="categoryId" class="form-select bg-dark text-light border-secondary" required>
                <option value="">Selecciona...</option>
                <option th:each="cat : ${categories}" th:value="${cat.id}" 
                        th:text="${cat.name}" th:selected="${product.category != null && cat.id == product.category.id}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">URL Imagen</label>
            <input type="text" th:field="*{imageUrl}" class="form-control bg-dark text-light border-secondary">
        </div>

        <div class="mb-3 form-check" th:if="${product.id}">
            <input type="checkbox" name="active" class="form-check-input" id="active" th:checked="${product.active}">
            <label for="active" class="form-check-label">Activo</label>
        </div>

        <button type="submit" class="btn btn-success" th:text="${product.id} ? 'Actualizar' : 'Crear Producto'"></button>
        <a th:href="@{/admin/products}" class="btn btn-outline-secondary ms-2">Cancelar</a>
    </form>
</div>
</body>
</html>
