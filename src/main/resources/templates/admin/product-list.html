<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Admin Productos — E-Gym</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body class="bg-dark text-light">
<div class="container my-4">
    <nav class="navbar navbar-dark bg-dark border-bottom border-secondary mb-4">
        <div class="container-fluid">
            <a class="navbar-brand text-warning fw-bold" href="#">Panel Admin</a>
            <div class="d-flex align-items-center">
                <span class="me-3">Hola, <span sec:authentication="name"></span></span>
                <a th:href="@{/catalog}" class="btn btn-outline-success btn-sm me-2">Catálogo</a>
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-outline-danger btn-sm">Salir</button>
                </form>
            </div>
        </div>
    </nav>

    <h1 class="text-success mb-4">Administración de Productos</h1>

    <!-- Alerta solo si msg existe y no está vacío -->
    <div th:if="${msg != null and !#strings.isEmpty(msg)}" 
         class="alert alert-success alert-dismissible fade show" role="alert">
        Operación exitosa: <span th:text="${msg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Filtros -->
    <form method="get" th:action="@{/admin/products}" class="row g-2 mb-4">
        <div class="col-md-5">
            <input type="text" name="search" 
                   class="form-control bg-dark text-light border-secondary" 
                   placeholder="Buscar por nombre..." 
                   th:value="${search} ?: ''">
        </div>
        <div class="col-md-4">
            <select name="category" class="form-select bg-dark text-light border-secondary">
                <option value="" th:selected="${selectedCategory == null}">Todas las categorías</option>
                <option th:each="cat : ${categories}" 
                        th:value="${cat.id}" 
                        th:text="${cat.name}" 
                        th:selected="${selectedCategory != null and cat.id == selectedCategory}"></option>
            </select>
        </div>
        <div class="col-md-3">
            <button type="submit" class="btn btn-outline-success w-100">Filtrar</button>
        </div>
    </form>

    <a th:href="@{/admin/products/new}" class="btn btn-success mb-3">+ Nuevo Producto</a>

    <!-- Tabla -->
    <div class="table-responsive">
        <table class="table table-dark table-hover align-middle">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Categoría</th>
                    <th>Precio</th>
                    <th>Activo</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="p : ${products}">
                    <td th:text="${p.id}"></td>
                    <td th:text="${p.name}"></td>
                    <!-- Null-safe: si category es null, muestra "Sin categoría" -->
                    <td th:text="${p.category?.name} ?: 'Sin categoría'"></td>
                    <td th:text="'$' + ${p.price}"></td>
                    <td>
                        <span th:if="${p.active}" class="badge bg-success">Sí</span>
                        <span th:unless="${p.active}" class="badge bg-secondary">No</span>
                    </td>
                    <td>
                        <a th:href="@{/admin/products/edit(id=${p.id})}" 
                           class="btn btn-warning btn-sm">Editar</a>
                        <!-- Formulario de eliminación con confirmación segura -->
                        <form th:action="@{/admin/products/delete}" method="post" class="d-inline" 
                              th:data-name="${p.name}"
                              onsubmit="return confirm('¿Eliminar ' + this.getAttribute('data-name') + '?')">
                            <input type="hidden" name="id" th:value="${p.id}">
                            <button type="submit" class="btn btn-danger btn-sm">Eliminar</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(products)}">
                    <td colspan="6" class="text-center text-muted py-4">No hay productos registrados.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
