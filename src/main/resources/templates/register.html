<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro — E-Gym Fitness</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body class="bg-dark text-light d-flex align-items-center" style="min-height:100vh">
<div class="container" style="max-width:500px">
    <h2 class="text-success mb-4 text-center">Crear Cuenta</h2>
    
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    
    <form method="post" th:action="@{/register}" th:object="${user}">
        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" th:field="*{firstName}" class="form-control bg-dark text-light border-secondary" required>
            <div th:if="${#fields.hasErrors('firstName')}" class="text-danger small mt-1" th:errors="*{firstName}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label">Apellido</label>
            <input type="text" th:field="*{lastName}" class="form-control bg-dark text-light border-secondary" required>
            <div th:if="${#fields.hasErrors('lastName')}" class="text-danger small mt-1" th:errors="*{lastName}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" th:field="*{email}" class="form-control bg-dark text-light border-secondary" required>
            <div th:if="${#fields.hasErrors('email')}" class="text-danger small mt-1" th:errors="*{email}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input type="password" th:field="*{password}" class="form-control bg-dark text-light border-secondary" required>
            <div th:if="${#fields.hasErrors('password')}" class="text-danger small mt-1" th:errors="*{password}"></div>
        </div>
        <button type="submit" class="btn btn-success w-100">Registrarse</button>
    </form>
    <p class="text-center mt-3">
        ¿Ya tienes cuenta? <a th:href="@{/login}" class="text-success">Inicia sesión</a>
    </p>
</div>
</body>
</html>
